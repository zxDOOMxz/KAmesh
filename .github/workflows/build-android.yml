name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Patch material AAR
        run: |
          set -x
          wget -q "https://repo1.maven.org/maven2/com/google/android/material/material/1.6.1/material-1.6.1.aar" -O /tmp/material-1.6.1.aar
          echo "Downloaded: $(ls -la /tmp/material-1.6.1.aar)"
          unzip -qo /tmp/material-1.6.1.aar -d /tmp/material-patched
          echo "Unzipped"
          sed -i '/actionBarSize/d' /tmp/material-patched/res/values/values.xml
          echo "Patched values.xml"
          cd /tmp/material-patched
          mkdir -p ~/.m2/repository/com/google/android/material/material/1.6.1
          jar cf ~/.m2/repository/com/google/android/material/material/1.6.1/material-1.6.1.aar .
          echo "Repacked"
          cd /
          rm -rf /tmp/material-patched /tmp/material-1.6.1.aar
          cat > ~/.m2/repository/com/google/android/material/material/1.6.1/material-1.6.1.pom <<POMEOF
<?xml version="1.0" encoding="UTF-8"?>
<project xmlns="http://maven.apache.org/POM/4.0.0">
  <modelVersion>4.0.0</modelVersion>
  <groupId>com.google.android.material</groupId>
  <artifactId>material</artifactId>
  <version>1.6.1</version>
  <packaging>aar</packaging>
</project>
POMEOF
          echo "Done"

      - name: Fix gradlew permission
        working-directory: android
        run: chmod +x gradlew

      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
